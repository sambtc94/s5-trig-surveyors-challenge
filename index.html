<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveyor's Challenge</title>
  <style>
    :root {
      --blue: #1d4ed8;
      --green: #15803d;
      --red: #dc2626;
      --bg: #f0f9ff;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
    }

    body {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0%, #eff6ff 30%, #f8fafc 100%);
      margin: 0;
      padding: 24px;
      color: var(--ink);
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      border: 1px solid #dbeafe;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
    }

    h1 {
      text-align: center;
      margin: 0 0 10px;
      color: #0f3e67;
      letter-spacing: 0.2px;
    }

    .top-header {
      margin-bottom: 12px;
    }

    .question-prompt {
      text-align: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    canvas {
      display: block;
      width: 600px;
      height: 350px;
      max-width: 100%;
      margin: 0 auto 12px;
      border: 3px solid #60a5fa;
      border-radius: 14px;
      background: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 60%, #e2e8f0 100%);
    }

    .badge-row,
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .badge {
      background: #dbeafe;
      color: #1e3a8a;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .stats-row {
      justify-content: center;
      margin: 0 0 12px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #bfdbfe;
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
    }

    .stats-row .badge {
      background: #ffffff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
    }

    .progress-wrap {
      margin: 8px 0 10px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .progress-track {
      height: 12px;
      background: #cbd5e1;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
      transition: width 0.2s ease;
    }

    .feedback {
      background: #f8fafc;
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    input,
    button {
      font-size: 1rem;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #94a3b8;
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.22);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .secondary {
      background: #64748b;
    }

    .success {
      color: var(--green);
      font-weight: 700;
    }

    .error {
      color: var(--red);
      font-weight: 700;
    }

    .note {
      display: none;
      margin-top: 6px;
      padding: 8px;
      border-left: 4px solid #f59e0b;
      background: #fffbeb;
      border-radius: 8px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #hintBtn,
    [data-role="hint"] {
      display: none !important;
    }

    #questionTypeBadge,
    #sceneTypeBadge,
    #ratioBadge {
      display: none !important;
    }

    .badge-row {
      display: none;
    }

    /* Draw-and-label section */
    #drawLabelSection {
      display: none;
      margin-bottom: 10px;
    }

    .draw-instruction {
      text-align: center;
      font-weight: 600;
      color: #0f3e67;
      margin-bottom: 10px;
      padding: 8px;
      background: #eff6ff;
      border-radius: 8px;
      border: 1px solid #bfdbfe;
    }

    .label-inputs {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .label-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .label-row label {
      min-width: 240px;
      font-weight: 600;
      color: var(--ink);
      font-size: 0.95rem;
    }

    .label-row input {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-header">
      <h1>Surveyor's Challenge</h1>
      <div class="stats-row">
        <span class="badge" id="questionsBadge"></span>
        <span class="badge" id="firstTryBadge"></span>
        <span class="badge" id="streakBadge"></span>
        <span class="badge" id="pointsBadge"></span>
      </div>
    </div>

    <div id="questionPrompt" class="question-prompt"></div>
    <canvas id="sceneCanvas" width="600" height="350"></canvas>

    <div class="badge-row">
      <span id="questionTypeBadge" class="badge"></span>
      <span id="sceneTypeBadge" class="badge"></span>
      <span id="ratioBadge" class="badge"></span>
    </div>

    <div id="drawLabelSection">
      <div class="draw-instruction" id="drawInstruction">Click to place 3 corners of your right-angle triangle on the canvas above</div>
      <div class="label-inputs">
        <div class="label-row">
          <label>Angle (θ) at surveyor:</label>
          <input type="text" id="labelAngle" placeholder="e.g. 53.1 (or ? if unknown)" />
        </div>
        <div class="label-row">
          <label>Vertical height (opposite side):</label>
          <input type="text" id="labelOpp" placeholder="value in m (or ? if unknown)" />
        </div>
        <div class="label-row">
          <label>Horizontal distance (adjacent side):</label>
          <input type="text" id="labelAdj" placeholder="value in m (or ? if unknown)" />
        </div>
        <div class="label-row">
          <label>Line-of-sight (hypotenuse):</label>
          <input type="text" id="labelHyp" placeholder="value in m (or ? if unknown)" />
        </div>
      </div>
    </div>

    <div class="controls">
      <input id="answerInput" type="number" step="0.1" placeholder="Type your answer" />
      <button id="checkBtn" type="button">Check Answer</button>
    </div>

    <div id="feedback" class="feedback" style="display:none;"></div>

    <div class="actions">
      <button id="tryAgainBtn" class="secondary" type="button" style="display:none;">Try Again</button>
      <button id="nextBtn" type="button" style="display:none;">Next Question</button>
    </div>

    <div id="depressionNote" class="note">
      Notice: the angle of depression from the observer equals the angle of elevation from the target — alternate angles on parallel lines!
    </div>
  </div>

  <script>
    const canvas = document.getElementById('sceneCanvas');
    const ctx = canvas.getContext('2d');

    const questionTypeBadge = document.getElementById('questionTypeBadge');
    const sceneTypeBadge = document.getElementById('sceneTypeBadge');
    const ratioBadge = document.getElementById('ratioBadge');
    const questionsBadge = document.getElementById('questionsBadge');
    const firstTryBadge = document.getElementById('firstTryBadge');
    const streakBadge = document.getElementById('streakBadge');
    const pointsBadge = document.getElementById('pointsBadge');
    const questionPrompt = document.getElementById('questionPrompt');
    const answerInput = document.getElementById('answerInput');
    const checkBtn = document.getElementById('checkBtn');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const depressionNote = document.getElementById('depressionNote');
    const questionTypes = [
      'HEIGHT_FROM_ADJ_ANGLE',
      'DIST_FROM_OPP_ANGLE',
      'ANGLE_FROM_SIDES',
      'HYP_FROM_OPP_ANGLE',
      'HYP_FROM_ADJ_ANGLE',
      'HEIGHT_FROM_HYP_ANGLE',
      'DIST_FROM_HYP_ANGLE',
      'DRAW_AND_LABEL'
    ];

    const triples = [
      [3, 4, 5],
      [5, 12, 13],
      [8, 15, 17],
      [7, 24, 25],
      [9, 40, 41]
    ];

    const state = {
      questionsAnswered: 0,
      correctFirstAttempt: 0,
      currentStreak: 0,
      points: 0,
      nextQuestionIndex: randInt(0, questionTypes.length - 1),
      currentQuestion: null
    };

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function nextQuestionType() {
      const type = questionTypes[state.nextQuestionIndex];
      state.nextQuestionIndex = (state.nextQuestionIndex + 1) % questionTypes.length;
      return type;
    }

    function roundTo1dp(value) {
      return Math.round(value * 10) / 10;
    }

    function createQuestion() {
      const sceneType = Math.random() < 0.5 ? 'ELEVATION' : 'DEPRESSION';
      const type = nextQuestionType();

      // For DRAW_AND_LABEL, choose a random underlying math type
      const underlyingTypes = questionTypes.filter(t => t !== 'DRAW_AND_LABEL');
      const isDrawAndLabel = type === 'DRAW_AND_LABEL';
      const mathType = isDrawAndLabel ? underlyingTypes[randInt(0, underlyingTypes.length - 1)] : type;

      const [a, b, c] = triples[randInt(0, triples.length - 1)];
      const scale = randInt(4, 10);
      const swapLegs = Math.random() < 0.5;
      const adjacent = (swapLegs ? b : a) * scale;
      const opposite = (swapLegs ? a : b) * scale;
      const hypotenuse = c * scale;
      const theta = roundTo1dp(Math.atan(opposite / adjacent) * 180 / Math.PI);

      let answer;
      let unknown;
      let ratio;
      let solveText = '';
      let prompt = '';

      if (mathType === 'HEIGHT_FROM_ADJ_ANGLE') {
        answer = opposite;
        unknown = 'opposite';
        ratio = 'tan';
        solveText = `${adjacent} × tan(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor is ${adjacent} m from a tower and measures an angle of elevation of ${theta}°. Find the tower height.`
          : `From a lookout point, a surveyor measures an angle of depression of ${theta}° to a target. The horizontal distance is ${adjacent} m. Find the vertical drop.`;
      } else if (mathType === 'DIST_FROM_OPP_ANGLE') {
        answer = adjacent;
        unknown = 'adjacent';
        ratio = 'tan';
        solveText = `${opposite} ÷ tan(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° to the top of a structure. The structure is ${opposite} m high. How far is the surveyor from the base?`
          : `A lookout station is ${opposite} m above sea level. A boat is seen at an angle of depression of ${theta}°. How far is the boat horizontally from the station?`;
      } else if (mathType === 'ANGLE_FROM_SIDES') {
        answer = theta;
        unknown = 'angle';
        ratio = 'tan';
        solveText = `tan⁻¹(${opposite} ÷ ${adjacent}) = ${answer.toFixed(1)}°`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor is ${adjacent} m from a building and the top is ${opposite} m above eye level. Find the angle of elevation.`
          : `From a cliff lookout, the target is ${adjacent} m away horizontally and ${opposite} m below. Find the angle of depression.`;
      } else if (mathType === 'HYP_FROM_OPP_ANGLE') {
        answer = hypotenuse;
        unknown = 'hypotenuse';
        ratio = 'sin';
        solveText = `${opposite} ÷ sin(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° and knows the height difference is ${opposite} m. Find the line-of-sight distance.`
          : `A lookout measures an angle of depression of ${theta}° to a point ${opposite} m below. Find the line-of-sight distance.`;
      } else if (mathType === 'HYP_FROM_ADJ_ANGLE') {
        answer = hypotenuse;
        unknown = 'hypotenuse';
        ratio = 'cos';
        solveText = `${adjacent} ÷ cos(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor stands ${adjacent} m from a tower and measures an angle of elevation of ${theta}°. Find the line-of-sight distance to the top.`
          : `A lookout sees a target at an angle of depression of ${theta}° with a horizontal distance of ${adjacent} m. Find the line-of-sight distance.`;
      } else if (mathType === 'HEIGHT_FROM_HYP_ANGLE') {
        answer = opposite;
        unknown = 'opposite';
        ratio = 'sin';
        solveText = `${hypotenuse} × sin(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° and a line-of-sight distance of ${hypotenuse} m. Find the height difference.`
          : `A lookout has a line of sight of ${hypotenuse} m to a target at an angle of depression of ${theta}°. Find the vertical drop.`;
      } else {
        answer = adjacent;
        unknown = 'adjacent';
        ratio = 'cos';
        solveText = `${hypotenuse} × cos(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° and a line-of-sight distance of ${hypotenuse} m. Find the horizontal distance to the base.`
          : `A lookout has a line-of-sight distance of ${hypotenuse} m to a target at an angle of depression of ${theta}°. Find the horizontal distance.`;
      }

      // Reset drawing state for new question
      drawState.points = [];
      drawState.rightAngleIdx = -1;
      drawState.phase = 'placing';

      state.currentQuestion = {
        sceneType,
        adjacent,
        opposite,
        hypotenuse,
        theta,
        type,
        mathType,
        ratio,
        unknown,
        solveText,
        prompt,
        answer,
        attempts: 0
      };
    }

    function getTypeLabel(type) {
      if (type === 'DRAW_AND_LABEL') return 'Draw & Label';
      if (type === 'HEIGHT_FROM_ADJ_ANGLE' || type === 'HEIGHT_FROM_HYP_ANGLE') return 'Find Height';
      if (type === 'DIST_FROM_OPP_ANGLE' || type === 'DIST_FROM_HYP_ANGLE') return 'Find Distance';
      if (type === 'ANGLE_FROM_SIDES') return 'Find Angle';
      return 'Find Line-of-Sight';
    }

    function workedSolution(q) {
      const valueText = q.unknown === 'angle' ? `${q.answer.toFixed(1)}°` : `${q.answer} m`;

      return [
        `Step 1: Use <strong>${q.ratio}</strong> for this relationship.`,
        `Step 2: Compute: ${q.solveText}`,
        `<strong>Answer: ${valueText}</strong>`
      ].join('<br>');
    }

    function getQuestionPrompt(q) {
      if (q.type === 'DRAW_AND_LABEL') {
        return `📐 Draw a diagram: ${q.prompt}`;
      }
      return q.prompt;
    }

    function updateBadges() {
      const q = state.currentQuestion;
      questionTypeBadge.textContent = `Question Type: ${getTypeLabel(q.type)}`;
      sceneTypeBadge.textContent = `Scene: ${q.sceneType === 'ELEVATION' ? 'Elevation' : 'Depression'}`;
      ratioBadge.textContent = `Trig Ratio: ${q.ratio}`;
      questionsBadge.textContent = `Questions: ${state.questionsAnswered}`;
      firstTryBadge.textContent = `First Try Correct: ${state.correctFirstAttempt}`;
      streakBadge.textContent = `Streak: ${state.currentStreak}`;
      pointsBadge.textContent = `Points: ${state.points}`;
      questionPrompt.textContent = getQuestionPrompt(q);
    }

    function drawArc(cx, cy, start, end, radius) {
      ctx.beginPath();
      ctx.arc(cx, cy, radius, start, end);
      ctx.stroke();
    }

    function drawTextWithHalo(text, x, y, color) {
      ctx.save();
      ctx.font = 'bold 18px Arial';
      const padX = 6;
      const width = ctx.measureText(text).width + padX * 2;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(x - padX, y - 16, width, 22);
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawSurveyorSprite(footX, footY, scale = 1, facing = 'right') {
      ctx.save();
      ctx.translate(footX, footY);
      ctx.scale(facing === 'left' ? -1 : 1, 1);

      // ground shadow
      ctx.fillStyle = 'rgba(15, 23, 42, 0.20)';
      ctx.beginPath();
      ctx.ellipse(0, 2 * scale, 14 * scale, 4 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      // legs and boots
      ctx.fillStyle = '#1f2937';
      ctx.fillRect(-8 * scale, -12 * scale, 5 * scale, 12 * scale);
      ctx.fillRect(3 * scale, -12 * scale, 5 * scale, 12 * scale);
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(-10 * scale, -1 * scale, 8 * scale, 3 * scale);
      ctx.fillRect(2 * scale, -1 * scale, 8 * scale, 3 * scale);

      // torso
      const jacketGrad = ctx.createLinearGradient(0, -24 * scale, 0, -10 * scale);
      jacketGrad.addColorStop(0, '#0f4c81');
      jacketGrad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = jacketGrad;
      ctx.fillRect(-10 * scale, -26 * scale, 20 * scale, 16 * scale);

      // high-vis vest
      ctx.fillStyle = '#facc15';
      ctx.fillRect(-3 * scale, -25 * scale, 6 * scale, 14 * scale);
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(-3 * scale, -20 * scale, 6 * scale, 1.8 * scale);

      // arms
      ctx.fillStyle = '#1d4ed8';
      ctx.fillRect(-16 * scale, -24 * scale, 7 * scale, 4 * scale);
      ctx.fillRect(9 * scale, -23 * scale, 8 * scale, 4 * scale);

      // head and helmet
      ctx.fillStyle = '#f1c27d';
      ctx.beginPath();
      ctx.arc(0, -32 * scale, 6.5 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(0, -35 * scale, 7.2 * scale, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-7 * scale, -35 * scale, 14 * scale, 2.2 * scale);

      // face detail
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      ctx.arc(-2 * scale, -32 * scale, 0.8 * scale, 0, Math.PI * 2);
      ctx.arc(2 * scale, -32 * scale, 0.8 * scale, 0, Math.PI * 2);
      ctx.fill();

      // tripod and scope
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 1.6 * scale;
      ctx.beginPath();
      ctx.moveTo(16 * scale, -18 * scale);
      ctx.lineTo(14 * scale, 0);
      ctx.moveTo(16 * scale, -18 * scale);
      ctx.lineTo(19 * scale, 0);
      ctx.moveTo(16 * scale, -18 * scale);
      ctx.lineTo(12 * scale, 0);
      ctx.stroke();

      const scopeGrad = ctx.createLinearGradient(9 * scale, -24 * scale, 20 * scale, -20 * scale);
      scopeGrad.addColorStop(0, '#334155');
      scopeGrad.addColorStop(1, '#0f172a');
      ctx.fillStyle = scopeGrad;
      ctx.fillRect(8 * scale, -24 * scale, 12 * scale, 4.5 * scale);

      ctx.strokeStyle = '#0b1220';
      ctx.lineWidth = 1.2 * scale;
      ctx.strokeRect(8.4 * scale, -23.6 * scale, 11.2 * scale, 3.7 * scale);
      ctx.restore();
    }

    function drawTargetSprite(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);

      // buoy base and shadow
      ctx.fillStyle = 'rgba(15, 23, 42, 0.18)';
      ctx.beginPath();
      ctx.ellipse(0, 8 * scale, 22 * scale, 6 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      const floatGrad = ctx.createLinearGradient(0, -6 * scale, 0, 10 * scale);
      floatGrad.addColorStop(0, '#fb923c');
      floatGrad.addColorStop(1, '#ea580c');
      ctx.fillStyle = floatGrad;
      ctx.beginPath();
      ctx.ellipse(0, 4 * scale, 20 * scale, 8 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      // mast
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 2 * scale;
      ctx.beginPath();
      ctx.moveTo(0, -20 * scale);
      ctx.lineTo(0, 2 * scale);
      ctx.stroke();

      // flag
      const flagGrad = ctx.createLinearGradient(0, -20 * scale, 16 * scale, -12 * scale);
      flagGrad.addColorStop(0, '#2563eb');
      flagGrad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = flagGrad;
      ctx.beginPath();
      ctx.moveTo(0, -20 * scale);
      ctx.lineTo(16 * scale, -16 * scale);
      ctx.lineTo(0, -12 * scale);
      ctx.closePath();
      ctx.fill();

      // reflective target marker
      ctx.fillStyle = '#e2e8f0';
      ctx.beginPath();
      ctx.arc(0, -2 * scale, 6 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0ea5e9';
      ctx.beginPath();
      ctx.arc(0, -2 * scale, 3 * scale, 0, Math.PI * 2);
      ctx.fill();

      // trim
      ctx.strokeStyle = '#7c2d12';
      ctx.lineWidth = 1.3 * scale;
      ctx.beginPath();
      ctx.ellipse(0, 4 * scale, 20 * scale, 8 * scale, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Draw canvas state for DRAW_AND_LABEL questions
    const drawState = {
      points: [],
      rightAngleIdx: -1,
      phase: 'placing' // 'placing' | 'marking' | 'done'
    };

    // Which labels to show for each question type (only the given/known values)
    function getShownLabels(q) {
      const t = q.mathType || q.type;
      return {
        angle: t !== 'ANGLE_FROM_SIDES',
        adj: t === 'HEIGHT_FROM_ADJ_ANGLE' || t === 'HYP_FROM_ADJ_ANGLE' || t === 'ANGLE_FROM_SIDES',
        opp: t === 'DIST_FROM_OPP_ANGLE' || t === 'HYP_FROM_OPP_ANGLE' || t === 'ANGLE_FROM_SIDES',
        hyp: t === 'HEIGHT_FROM_HYP_ANGLE' || t === 'DIST_FROM_HYP_ANGLE'
      };
    }

    function drawScene() {
      const q = state.currentQuestion;

      if (q.type === 'DRAW_AND_LABEL') {
        drawDrawingCanvas();
        return;
      }

      const shown = getShownLabels(q);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#0f172a';
      ctx.fillStyle = '#0f172a';
      ctx.font = 'bold 18px Arial';

      const leftX = 80;
      const rightX = 470;
      const groundY = 280;

      const sky = ctx.createLinearGradient(0, 0, 0, groundY);
      sky.addColorStop(0, '#dbeafe');
      sky.addColorStop(1, '#f0f9ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, groundY);
      ctx.fillStyle = '#d1fae5';
      ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

      ctx.beginPath();
      ctx.moveTo(20, groundY);
      ctx.lineTo(580, groundY);
      ctx.strokeStyle = '#14532d';
      ctx.stroke();

      if (q.sceneType === 'ELEVATION') {
        const observer = { x: leftX, y: groundY };
        const top = { x: rightX, y: 110 };

        drawSurveyorSprite(observer.x - 2, observer.y + 2, 1, 'right');

        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(rightX, observer.y);
        ctx.strokeStyle = '#64748b';
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(rightX, groundY);
        ctx.lineTo(rightX, top.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(top.x, top.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(rightX - 20, groundY);
        ctx.lineTo(rightX - 20, groundY - 20);
        ctx.lineTo(rightX, groundY - 20);
        ctx.stroke();

        drawArc(observer.x, observer.y, -0.45, 0, 28);
        if (shown.adj) {
          ctx.fillStyle = '#1d4ed8';
          ctx.fillText(`${q.adjacent} m`, (observer.x + rightX) / 2 - 30, observer.y + 24);
        }
        if (shown.opp) {
          ctx.fillStyle = '#1d4ed8';
          ctx.fillText(`${q.opposite} m`, rightX + 12, (groundY + top.y) / 2);
        }
        if (shown.angle) {
          drawTextWithHalo(`${q.theta}°`, observer.x + 42, observer.y - 34, '#1d4ed8');
        }
        if (shown.hyp) {
          drawTextWithHalo(`${q.hypotenuse} m`, (observer.x + top.x) / 2 - 24, (observer.y + top.y) / 2 - 8, '#1d4ed8');
        }
      } else {
        const observer = { x: leftX, y: 95 };
        const target = { x: rightX, y: groundY };
        const buildingTopY = observer.y + 18;

        ctx.beginPath();
        ctx.moveTo(40, groundY);
        ctx.lineTo(130, groundY);
        ctx.lineTo(130, buildingTopY);
        ctx.lineTo(40, buildingTopY);
        ctx.closePath();
        ctx.fillStyle = '#cbd5e1';
        ctx.fill();

        drawSurveyorSprite(observer.x, buildingTopY, 0.95, 'right');

        ctx.strokeStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();

        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(target.x, observer.y);
        ctx.strokeStyle = '#64748b';
        ctx.stroke();
        ctx.setLineDash([]);

        drawTargetSprite(target.x, target.y, 1);

        drawArc(observer.x, observer.y, 0, 0.45, 28);
        drawArc(target.x, target.y, -Math.PI + 0.12, -Math.PI + 0.55, 22);

        if (shown.adj) {
          ctx.fillStyle = '#1d4ed8';
          ctx.fillText(`${q.adjacent} m`, (observer.x + target.x) / 2 - 30, groundY + 24);
        }
        if (shown.opp) {
          ctx.fillStyle = '#1d4ed8';
          ctx.fillText(`${q.opposite} m`, observer.x - 62, (observer.y + groundY) / 2);
        }
        if (shown.angle) {
          drawTextWithHalo(`${q.theta}°`, observer.x + 44, observer.y + 40, '#1d4ed8');
        }
        if (shown.hyp) {
          drawTextWithHalo(`${q.hypotenuse} m`, (observer.x + target.x) / 2 - 20, (observer.y + target.y) / 2 + 8, '#1d4ed8');
        }
      }
    }

    function drawDrawingCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Light grid background
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 1;
      const gridStep = 40;
      for (let x = 0; x <= canvas.width; x += gridStep) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= canvas.height; y += gridStep) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      const pts = drawState.points;

      // Draw lines between placed points
      if (pts.length >= 2) {
        ctx.strokeStyle = '#1d4ed8';
        ctx.lineWidth = 3;
        for (let i = 0; i < pts.length - 1; i++) {
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[i + 1].x, pts[i + 1].y);
          ctx.stroke();
        }
        // Close triangle once 3 points
        if (pts.length === 3) {
          ctx.beginPath();
          ctx.moveTo(pts[2].x, pts[2].y);
          ctx.lineTo(pts[0].x, pts[0].y);
          ctx.stroke();
        }
      }

      // Draw right-angle marker
      if (drawState.rightAngleIdx >= 0) {
        const p = pts[drawState.rightAngleIdx];
        const prev = pts[(drawState.rightAngleIdx + 2) % 3];
        const next = pts[(drawState.rightAngleIdx + 1) % 3];
        const size = 18;
        const vPrev = normalize(prev.x - p.x, prev.y - p.y, size);
        const vNext = normalize(next.x - p.x, next.y - p.y, size);
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.x + vPrev.x, p.y + vPrev.y);
        ctx.lineTo(p.x + vPrev.x + vNext.x, p.y + vPrev.y + vNext.y);
        ctx.lineTo(p.x + vNext.x, p.y + vNext.y);
        ctx.stroke();
      }

      // Draw corner dots
      pts.forEach((p, i) => {
        ctx.fillStyle = i === drawState.rightAngleIdx ? '#15803d' : '#2563eb';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
        ctx.fill();
      });

      // Instruction overlay
      let instruction = '';
      if (drawState.phase === 'placing') {
        instruction = pts.length === 0
          ? 'Click to place corner 1 (surveyor position)'
          : pts.length === 1
            ? 'Click to place corner 2'
            : 'Click to place corner 3 — close your triangle';
      } else if (drawState.phase === 'marking') {
        instruction = 'Click near a corner to mark the right angle (∟)';
      } else {
        instruction = '✔ Triangle drawn! Fill in the labels below, then click Check Labels.';
      }

      ctx.save();
      ctx.font = 'bold 15px Arial';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      const tw = ctx.measureText(instruction).width + 20;
      ctx.fillRect((canvas.width - tw) / 2, 10, tw, 28);
      ctx.fillStyle = '#0f3e67';
      ctx.textAlign = 'center';
      ctx.fillText(instruction, canvas.width / 2, 29);
      ctx.restore();
    }

    function normalize(dx, dy, len) {
      const mag = Math.sqrt(dx * dx + dy * dy) || 1;
      return { x: (dx / mag) * len, y: (dy / mag) * len };
    }

    function resetRoundUI() {
      feedback.style.display = 'none';
      feedback.innerHTML = '';
      nextBtn.style.display = 'none';
      tryAgainBtn.style.display = 'none';
      depressionNote.style.display = 'none';
      answerInput.value = '';

      const isDrawAndLabel = state.currentQuestion && state.currentQuestion.type === 'DRAW_AND_LABEL';
      document.getElementById('drawLabelSection').style.display = isDrawAndLabel ? 'block' : 'none';
      document.querySelector('.controls').style.display = isDrawAndLabel ? 'none' : 'grid';
      if (isDrawAndLabel) {
        document.getElementById('labelAngle').value = '';
        document.getElementById('labelOpp').value = '';
        document.getElementById('labelAdj').value = '';
        document.getElementById('labelHyp').value = '';
        document.getElementById('drawInstruction').textContent =
          'Click to place 3 corners of your right-angle triangle on the canvas above';
      }
    }

    function render() {
      updateBadges();
      drawScene();
      resetRoundUI();
      const isDrawAndLabel = state.currentQuestion && state.currentQuestion.type === 'DRAW_AND_LABEL';
      checkBtn.textContent = isDrawAndLabel ? 'Check Labels' : 'Check Answer';
    }

    function workedSolutionDrawAndLabel(q) {
      const shown = getShownLabels(q);
      const lines = [`<strong>Correct labels for your diagram:</strong>`];
      if (shown.angle) lines.push(`θ (angle) = ${q.theta}°`);
      if (shown.adj) lines.push(`Adjacent (horizontal) = ${q.adjacent} m`);
      if (shown.opp) lines.push(`Opposite (vertical) = ${q.opposite} m`);
      if (shown.hyp) lines.push(`Hypotenuse (line-of-sight) = ${q.hypotenuse} m`);
      lines.push(`Unknown (${q.unknown}) → marked with "?"`);
      lines.push(`<br>Then solve: ${q.solveText}`);
      return lines.join('<br>');
    }

    function checkDrawAndLabel() {
      const q = state.currentQuestion;
      const shown = getShownLabels(q);

      function parseField(id) {
        return document.getElementById(id).value.trim().replace(/[°m\s]/g, '').toLowerCase();
      }

      const rawAngle = parseField('labelAngle');
      const rawOpp = parseField('labelOpp');
      const rawAdj = parseField('labelAdj');
      const rawHyp = parseField('labelHyp');

      function checkGiven(raw, expected) {
        const num = parseFloat(raw);
        return !isNaN(num) && Math.abs(num - expected) <= 0.5;
      }

      function checkUnknown(raw) {
        return raw === '?';
      }

      const errors = [];

      if (shown.angle) {
        if (!checkGiven(rawAngle, q.theta)) errors.push(`Angle should be ${q.theta}°`);
      } else {
        if (!checkUnknown(rawAngle)) errors.push('Unknown angle should be labeled "?"');
      }

      if (shown.adj) {
        if (!checkGiven(rawAdj, q.adjacent)) errors.push(`Adjacent side should be ${q.adjacent} m`);
      } else if (q.unknown === 'adjacent') {
        if (!checkUnknown(rawAdj)) errors.push('Unknown adjacent side should be labeled "?"');
      }

      if (shown.opp) {
        if (!checkGiven(rawOpp, q.opposite)) errors.push(`Opposite side should be ${q.opposite} m`);
      } else if (q.unknown === 'opposite') {
        if (!checkUnknown(rawOpp)) errors.push('Unknown opposite side should be labeled "?"');
      }

      if (shown.hyp) {
        if (!checkGiven(rawHyp, q.hypotenuse)) errors.push(`Hypotenuse should be ${q.hypotenuse} m`);
      } else if (q.unknown === 'hypotenuse') {
        if (!checkUnknown(rawHyp)) errors.push('Unknown hypotenuse should be labeled "?"');
      }

      const correct = errors.length === 0;

      if (q.attempts === 0) {
        state.questionsAnswered += 1;
        if (correct) state.correctFirstAttempt += 1;
      }
      q.attempts += 1;

      feedback.style.display = 'block';
      if (correct) {
        state.points += q.attempts === 1 ? 10 : 5;
        state.currentStreak += 1;
        feedback.innerHTML = `<div class="success">✔ Well done! Your diagram labels are correct.</div>
          <div>${workedSolutionDrawAndLabel(q)}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'none';
      } else {
        state.points = Math.max(0, state.points - 2);
        state.currentStreak = 0;
        feedback.innerHTML = `<div class="error">✖ Not quite. Check your labels:</div>
          <div>${errors.map(e => `• ${e}`).join('<br>')}</div>
          <div style="margin-top:6px;">${workedSolutionDrawAndLabel(q)}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'inline-block';
      }
      updateBadges();
    }

    function showFeedback(correct, extraMessage = '') {
      const q = state.currentQuestion;
      const answerText = q.unknown === 'angle' ? `${q.answer.toFixed(1)}°` : `${q.answer} m`;
      feedback.style.display = 'block';

      if (correct) {
        feedback.innerHTML = `<div class="success">✔ Well done!</div>
          <div>Your answer is correct.</div>
          <div><strong>Answer:</strong> ${answerText}${extraMessage ? `<br>${extraMessage}` : ''}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'none';
      } else {
        feedback.innerHTML = `<div class="error">✖ Not quite.</div>
          <div>Full worked solution:</div>
          <div>${workedSolution(q)}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'inline-block';
      }

      if (q.sceneType === 'DEPRESSION') {
        depressionNote.style.display = 'block';
      }

      updateBadges();
    }

    function isAnswerCorrect(userAnswer, expected, type) {
      if (type === 'ANGLE_FROM_SIDES') {
        return Math.abs(userAnswer - expected) <= 0.2;
      }
      return Math.abs(userAnswer - expected) <= 0.5;
    }

    function handleCheck() {
      const q = state.currentQuestion;

      if (q.type === 'DRAW_AND_LABEL') {
        checkDrawAndLabel();
        return;
      }

      const value = parseFloat(answerInput.value);

      if (Number.isNaN(value)) {
        showFeedback(false, 'Please enter a number.');
        return;
      }

      const correct = isAnswerCorrect(value, q.answer, q.type);

      if (q.attempts === 0) {
        state.questionsAnswered += 1;
        if (correct) {
          state.correctFirstAttempt += 1;
        }
      }
      q.attempts += 1;

      if (correct) {
        state.points += q.attempts === 1 ? 10 : 5;
        state.currentStreak += 1;
        showFeedback(true);
      } else {
        state.points = Math.max(0, state.points - 2);
        state.currentStreak = 0;
        showFeedback(false);
      }
    }

    // Canvas click handler for DRAW_AND_LABEL drawing interaction
    canvas.addEventListener('click', (e) => {
      if (!state.currentQuestion || state.currentQuestion.type !== 'DRAW_AND_LABEL') return;
      if (drawState.phase === 'done') return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      if (drawState.phase === 'placing') {
        drawState.points.push({ x, y });
        if (drawState.points.length === 3) {
          drawState.phase = 'marking';
        }
      } else if (drawState.phase === 'marking') {
        let minDist = Infinity;
        let minIdx = 0;
        drawState.points.forEach((p, i) => {
          const d = Math.hypot(p.x - x, p.y - y);
          if (d < minDist) { minDist = d; minIdx = i; }
        });
        drawState.rightAngleIdx = minIdx;
        drawState.phase = 'done';
        document.getElementById('drawInstruction').textContent =
          '✔ Triangle drawn! Fill in the labels below, then click Check Labels.';
      }

      drawScene();
    });

    checkBtn.addEventListener('click', handleCheck);

    tryAgainBtn.addEventListener('click', () => {
      feedback.style.display = 'none';
      tryAgainBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      if (state.currentQuestion && state.currentQuestion.type !== 'DRAW_AND_LABEL') {
        answerInput.focus();
      }
    });

    nextBtn.addEventListener('click', () => {
      createQuestion();
      render();
    });

    createQuestion();
    render();
  </script>
</body>
</html>
