<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveyor's Challenge</title>
  <style>
    :root {
      --blue: #1d4ed8;
      --green: #15803d;
      --red: #dc2626;
      --bg: #f0f9ff;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
    }

    body {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0%, #eff6ff 30%, #f8fafc 100%);
      margin: 0;
      padding: 24px;
      color: var(--ink);
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      border: 1px solid #dbeafe;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
    }

    h1 {
      text-align: center;
      margin: 0 0 14px;
      color: #0f3e67;
      letter-spacing: 0.2px;
    }

    .question-prompt {
      text-align: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    canvas {
      display: block;
      width: 600px;
      height: 350px;
      max-width: 100%;
      margin: 0 auto 12px;
      border: 3px solid #60a5fa;
      border-radius: 14px;
      background: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 60%, #e2e8f0 100%);
    }

    .badge-row,
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .badge {
      background: #dbeafe;
      color: #1e3a8a;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .progress-wrap {
      margin: 8px 0 10px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .progress-track {
      height: 12px;
      background: #cbd5e1;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
      transition: width 0.2s ease;
    }

    .known-values,
    .scaffold,
    .feedback {
      background: #f8fafc;
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .known-values {
      display: none;
    }

    .known-values strong,
    .scaffold strong {
      color: #1e40af;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .ratio-buttons {
      display: none;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .ratio-btn {
      border: 2px solid #2563eb;
      color: #1e3a8a;
      background: white;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .ratio-btn.active {
      background: #2563eb;
      color: #fff;
    }

    input,
    button {
      font-size: 1rem;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #94a3b8;
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.22);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .secondary {
      background: #64748b;
    }

    .success {
      color: var(--green);
      font-weight: 700;
    }

    .error {
      color: var(--red);
      font-weight: 700;
    }

    .note {
      display: none;
      margin-top: 6px;
      padding: 8px;
      border-left: 4px solid #f59e0b;
      background: #fffbeb;
      border-radius: 8px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #hintBtn,
    [data-role="hint"] {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Surveyor's Challenge</h1>
    <div id="questionPrompt" class="question-prompt"></div>
    <canvas id="sceneCanvas" width="600" height="350"></canvas>

    <div class="badge-row">
      <span id="questionTypeBadge" class="badge"></span>
      <span id="sceneTypeBadge" class="badge"></span>
      <span id="levelBadge" class="badge"></span>
    </div>

    <div class="stats-row">
      <span class="badge" id="questionsBadge"></span>
      <span class="badge" id="firstTryBadge"></span>
      <span class="badge" id="streakBadge"></span>
      <span class="badge" id="pointsBadge"></span>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <strong>Progress</strong>
        <span id="progressText"></span>
      </div>
      <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <div id="knownValues" class="known-values"></div>
    <div id="scaffoldArea" class="scaffold"></div>

    <div class="controls">
      <div id="ratioButtons" class="ratio-buttons">
        <button class="ratio-btn" data-ratio="sin" type="button">sin</button>
        <button class="ratio-btn" data-ratio="cos" type="button">cos</button>
        <button class="ratio-btn" data-ratio="tan" type="button">tan</button>
      </div>
      <input id="equationInput" type="text" placeholder="Write your equation here (Guided level)" style="display:none;" />
      <input id="answerInput" type="number" step="0.1" placeholder="Type your answer" />
      <button id="checkBtn" type="button">Check Answer</button>
    </div>

    <div id="feedback" class="feedback" style="display:none;"></div>

    <div class="actions">
      <button id="tryAgainBtn" class="secondary" type="button" style="display:none;">Try Again</button>
      <button id="nextBtn" type="button" style="display:none;">Next Question</button>
    </div>

    <div id="depressionNote" class="note">
      Notice: the angle of depression from the observer equals the angle of elevation from the target — alternate angles on parallel lines!
    </div>
  </div>

  <script>
    const canvas = document.getElementById('sceneCanvas');
    const ctx = canvas.getContext('2d');

    const questionTypeBadge = document.getElementById('questionTypeBadge');
    const sceneTypeBadge = document.getElementById('sceneTypeBadge');
    const levelBadge = document.getElementById('levelBadge');
    const questionsBadge = document.getElementById('questionsBadge');
    const firstTryBadge = document.getElementById('firstTryBadge');
    const streakBadge = document.getElementById('streakBadge');
    const pointsBadge = document.getElementById('pointsBadge');
    const questionPrompt = document.getElementById('questionPrompt');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const knownValues = document.getElementById('knownValues');
    const scaffoldArea = document.getElementById('scaffoldArea');
    const ratioButtons = document.getElementById('ratioButtons');
    const equationInput = document.getElementById('equationInput');
    const answerInput = document.getElementById('answerInput');
    const checkBtn = document.getElementById('checkBtn');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const depressionNote = document.getElementById('depressionNote');

    const questionTypes = ['A', 'B', 'C'];

    const state = {
      level: 1,
      levelStreak: 0,
      questionsAnswered: 0,
      correctFirstAttempt: 0,
      currentStreak: 0,
      points: 0,
      nextQuestionIndex: randInt(0, questionTypes.length - 1),
      ratioSelected: null,
      currentQuestion: null
    };

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function nextQuestionType() {
      const type = questionTypes[state.nextQuestionIndex];
      state.nextQuestionIndex = (state.nextQuestionIndex + 1) % questionTypes.length;
      return type;
    }

    function roundTo1dp(value) {
      return Math.round(value * 10) / 10;
    }

    function createQuestion() {
      const sceneType = Math.random() < 0.5 ? 'ELEVATION' : 'DEPRESSION';
      const d = randInt(20, 90);
      const theta = randInt(25, 65);
      const h = Math.round(d * Math.tan(theta * Math.PI / 180));
      const type = nextQuestionType();

      let answer;
      if (type === 'A') {
        answer = h;
      } else if (type === 'B') {
        answer = Math.round(h / Math.tan(theta * Math.PI / 180));
      } else {
        answer = roundTo1dp(Math.atan(h / d) * 180 / Math.PI);
      }

      state.currentQuestion = {
        sceneType,
        d,
        theta,
        h,
        type,
        answer,
        attempts: 0
      };
      state.ratioSelected = null;
    }

    function getTypeLabel(type) {
      return type === 'A' ? 'Find Height' : type === 'B' ? 'Find Distance' : 'Find Angle';
    }

    function knownValuesHtml(q) {
      let html = '<strong>Known values:</strong> ';
      if (q.type === 'A') {
        html += `Distance d = ${q.d} m, Angle θ = ${q.theta}°`;
      } else if (q.type === 'B') {
        html += `Height h = ${q.h} m, Angle θ = ${q.theta}°`;
      } else {
        html += `Height h = ${q.h} m, Distance d = ${q.d} m`;
      }
      return html;
    }

    function workedSolution(q) {
      const valueText = q.type === 'C' ? `${q.answer.toFixed(1)}°` : `${q.answer} m`;
      let step3;
      if (q.type === 'A') {
        step3 = `Solve: h = d × tan(θ) = ${q.d} × tan(${q.theta}°) = ${q.answer} m`;
      } else if (q.type === 'B') {
        step3 = `Solve: d = h / tan(θ) = ${q.h} / tan(${q.theta}°) = ${q.answer} m`;
      } else {
        step3 = `Solve: θ = tan^-1(h / d) = tan^-1(${q.h} / ${q.d}) = ${q.answer.toFixed(1)}°`;
      }

      return [
        'Step 1: Which ratio? <strong>tan</strong> — because we have opposite and adjacent.',
        'Step 2: Set up: <strong>tan(θ) = h / d</strong>',
        `Step 3: ${step3}`,
        `<strong>Answer: ${valueText}</strong>`
      ].join('<br>');
    }

    function scaffoldHtml(q) {
      if (state.level === 1) {
        return '';
      }
      if (state.level === 2) {
        return '<strong>Guided (Level 2)</strong><br>Use <strong>tan</strong> because it connects opposite and adjacent. Write your equation and answer.';
      }
      if (state.level === 3) {
        return '<strong>Setup (Level 3)</strong><br>Equation shell: <strong>tan(θ) = __ / __</strong>. Fill in and solve for the unknown.';
      }
      return '';
    }

    function getQuestionPrompt(q) {
      if (q.type === 'A') {
        return q.sceneType === 'ELEVATION'
          ? 'A surveyor looks up to the top of an object. Use the triangle to find the height h (in metres).'
          : 'A surveyor looks down to a target. Use the triangle to find the vertical height h (in metres).';
      }
      if (q.type === 'B') {
        return q.sceneType === 'ELEVATION'
          ? 'A surveyor looks up to a top point. Use the triangle to find the horizontal distance d (in metres).'
          : 'A surveyor looks down to a target. How far is it from the base of the building to the target?';
      }
      return q.sceneType === 'ELEVATION'
        ? 'A surveyor looks up to a top point. Use the triangle to find the angle θ (in degrees).'
        : 'A surveyor looks down to a target. Use the triangle to find the angle θ (in degrees).';
    }

    function updateBadges() {
      const q = state.currentQuestion;
      questionTypeBadge.textContent = `Question Type: ${getTypeLabel(q.type)}`;
      sceneTypeBadge.textContent = `Scene: ${q.sceneType === 'ELEVATION' ? 'Elevation' : 'Depression'}`;
      levelBadge.textContent = `Scaffold: Level ${state.level}`;
      questionsBadge.textContent = `Questions: ${state.questionsAnswered}`;
      firstTryBadge.textContent = `First Try Correct: ${state.correctFirstAttempt}`;
      streakBadge.textContent = `Streak: ${state.currentStreak}`;
      pointsBadge.textContent = `Points: ${state.points}`;

      const progressUnits = state.level === 4 ? 6 : ((state.level - 1) * 2 + state.levelStreak);
      const masteryPercent = Math.round((progressUnits / 6) * 100);
      progressFill.style.width = `${masteryPercent}%`;
      progressText.textContent = state.level === 4 ? 'Mastery complete' : `Level ${state.level}: ${state.levelStreak}/2`;
      questionPrompt.textContent = getQuestionPrompt(q);
    }

    function drawArc(cx, cy, start, end, radius) {
      ctx.beginPath();
      ctx.arc(cx, cy, radius, start, end);
      ctx.stroke();
    }

    function drawTextWithHalo(text, x, y, color) {
      ctx.save();
      ctx.font = 'bold 18px Arial';
      const padX = 6;
      const width = ctx.measureText(text).width + padX * 2;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(x - padX, y - 16, width, 22);
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawSurveyorSprite(footX, footY, scale = 1, facing = 'right') {
      ctx.save();
      ctx.translate(footX, footY);
      ctx.scale(facing === 'left' ? -1 : 1, 1);
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = '#0f172a';
      ctx.fillStyle = '#0f172a';

      ctx.beginPath();
      ctx.arc(0, -24 * scale, 6.5 * scale, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0, -17 * scale);
      ctx.lineTo(0, -7 * scale);
      ctx.moveTo(0, -15 * scale);
      ctx.lineTo(-9 * scale, -11 * scale);
      ctx.moveTo(0, -14 * scale);
      ctx.lineTo(9 * scale, -13 * scale);
      ctx.moveTo(0, -7 * scale);
      ctx.lineTo(-6 * scale, 0);
      ctx.moveTo(0, -7 * scale);
      ctx.lineTo(6 * scale, 0);
      ctx.stroke();

      ctx.fillStyle = '#334155';
      ctx.fillRect(9 * scale, -17 * scale, 10 * scale, 4 * scale);
      ctx.beginPath();
      ctx.moveTo(10 * scale, -13 * scale);
      ctx.lineTo(16 * scale, -9 * scale);
      ctx.lineTo(15 * scale, -13 * scale);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#475569';
      ctx.beginPath();
      ctx.moveTo(16 * scale, -9 * scale);
      ctx.lineTo(14 * scale, -2 * scale);
      ctx.lineTo(18 * scale, -2 * scale);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function drawTargetSprite(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);

      ctx.fillStyle = '#0ea5e9';
      ctx.beginPath();
      ctx.ellipse(0, 6, 28 * scale, 10 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#0284c7';
      ctx.beginPath();
      ctx.arc(0, 2, 8 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e0f2fe';
      ctx.beginPath();
      ctx.arc(0, 2, 4 * scale, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#0f172a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -18 * scale);
      ctx.lineTo(0, 2);
      ctx.stroke();

      ctx.fillStyle = '#1d4ed8';
      ctx.beginPath();
      ctx.moveTo(0, -18 * scale);
      ctx.lineTo(14 * scale, -14 * scale);
      ctx.lineTo(0, -10 * scale);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawScene() {
      const q = state.currentQuestion;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#0f172a';
      ctx.fillStyle = '#0f172a';
      ctx.font = 'bold 18px Arial';

      const leftX = 80;
      const rightX = 470;
      const groundY = 280;

      const sky = ctx.createLinearGradient(0, 0, 0, groundY);
      sky.addColorStop(0, '#dbeafe');
      sky.addColorStop(1, '#f0f9ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, groundY);
      ctx.fillStyle = '#d1fae5';
      ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

      ctx.beginPath();
      ctx.moveTo(20, groundY);
      ctx.lineTo(580, groundY);
      ctx.strokeStyle = '#14532d';
      ctx.stroke();

      if (q.sceneType === 'ELEVATION') {
        const observer = { x: leftX, y: groundY };
        const top = { x: rightX, y: 110 };

        drawSurveyorSprite(observer.x - 2, observer.y + 2, 1, 'right');

        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(rightX, observer.y);
        ctx.strokeStyle = '#64748b';
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(rightX, groundY);
        ctx.lineTo(rightX, top.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(top.x, top.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(rightX - 20, groundY);
        ctx.lineTo(rightX - 20, groundY - 20);
        ctx.lineTo(rightX, groundY - 20);
        ctx.stroke();

        drawArc(observer.x, observer.y, -0.45, 0, 28);
        drawTextWithHalo('θ', observer.x + 18, observer.y - 20, '#0f172a');

        ctx.fillStyle = '#1d4ed8';
        if (q.type !== 'B') ctx.fillText(`d = ${q.d}m`, (observer.x + rightX) / 2 - 35, observer.y + 24);
        if (q.type !== 'A') ctx.fillText(`h = ${q.h}m`, rightX + 12, (groundY + top.y) / 2);
        if (q.type !== 'C') drawTextWithHalo(`${q.theta}°`, observer.x + 44, observer.y - 34, '#1d4ed8');

        ctx.fillStyle = '#dc2626';
        if (q.type === 'A') ctx.fillText('h = ?', rightX + 10, (groundY + top.y) / 2);
        if (q.type === 'B') ctx.fillText('d = ?', (observer.x + rightX) / 2 - 35, observer.y + 24);
        if (q.type === 'C') drawTextWithHalo('θ = ?', observer.x + 46, observer.y - 34, '#dc2626');
      } else {
        const observer = { x: leftX, y: 95 };
        const target = { x: rightX, y: groundY };
        const buildingTopY = observer.y + 18;

        ctx.beginPath();
        ctx.moveTo(40, groundY);
        ctx.lineTo(130, groundY);
        ctx.lineTo(130, buildingTopY);
        ctx.lineTo(40, buildingTopY);
        ctx.closePath();
        ctx.fillStyle = '#cbd5e1';
        ctx.fill();

        drawSurveyorSprite(observer.x, buildingTopY, 0.95, 'right');

        ctx.strokeStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();

        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(target.x, observer.y);
        ctx.strokeStyle = '#64748b';
        ctx.stroke();
        ctx.setLineDash([]);

        drawTargetSprite(target.x, target.y, 1);

        drawArc(observer.x, observer.y, 0, 0.45, 28);
        drawTextWithHalo('θ', observer.x + 16, observer.y + 34, '#0f172a');

        drawArc(target.x, target.y, -Math.PI + 0.12, -Math.PI + 0.55, 22);

        ctx.fillStyle = '#1d4ed8';
        if (q.type !== 'B') ctx.fillText(`d = ${q.d}m`, (observer.x + target.x) / 2 - 30, groundY + 24);
        if (q.type !== 'A') ctx.fillText(`h = ${q.h}m`, observer.x - 62, (observer.y + groundY) / 2);
        if (q.type !== 'C') drawTextWithHalo(`${q.theta}°`, observer.x + 44, observer.y + 40, '#1d4ed8');

        ctx.fillStyle = '#dc2626';
        if (q.type === 'A') ctx.fillText('h = ?', observer.x - 62, (observer.y + groundY) / 2);
        if (q.type === 'B') ctx.fillText('d = ?', (observer.x + target.x) / 2 - 30, groundY + 24);
        if (q.type === 'C') drawTextWithHalo('θ = ?', observer.x + 44, observer.y + 40, '#dc2626');
      }
    }

    function resetRoundUI() {
      feedback.style.display = 'none';
      feedback.innerHTML = '';
      nextBtn.style.display = 'none';
      tryAgainBtn.style.display = 'none';
      depressionNote.style.display = 'none';
      answerInput.value = '';
      equationInput.value = '';
      ratioButtons.querySelectorAll('.ratio-btn').forEach((btn) => btn.classList.remove('active'));

      ratioButtons.style.display = state.level === 4 ? 'flex' : 'none';
      equationInput.style.display = state.level === 2 ? 'block' : 'none';
    }

    function render() {
      const q = state.currentQuestion;
      updateBadges();
      knownValues.innerHTML = knownValuesHtml(q);
      scaffoldArea.innerHTML = scaffoldHtml(q);
      scaffoldArea.style.display = scaffoldArea.innerHTML ? 'block' : 'none';
      drawScene();
      resetRoundUI();
    }

    function showFeedback(correct, extraMessage = '') {
      const q = state.currentQuestion;
      const answerText = q.type === 'C' ? `${q.answer.toFixed(1)}°` : `${q.answer} m`;
      feedback.style.display = 'block';

      if (correct) {
        feedback.innerHTML = `<div class="success">✔ Well done!</div>
          <div>Your answer is correct. We use tan because opposite and adjacent are connected in this triangle.</div>
          <div><strong>Answer:</strong> ${answerText}${extraMessage ? `<br>${extraMessage}` : ''}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'none';
      } else {
        feedback.innerHTML = `<div class="error">✖ Not quite.</div>
          <div>Full worked solution:</div>
          <div>${workedSolution(q)}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'inline-block';
      }

      if (q.sceneType === 'DEPRESSION') {
        depressionNote.style.display = 'block';
      }

      updateBadges();
    }

    function isAnswerCorrect(userAnswer, expected, type) {
      if (type === 'C') {
        return Math.abs(userAnswer - expected) <= 0.2;
      }
      return Math.abs(userAnswer - expected) <= 0.5;
    }

    function handleCheck() {
      const q = state.currentQuestion;
      const value = parseFloat(answerInput.value);

      if (Number.isNaN(value)) {
        showFeedback(false, 'Please enter a number.');
        return;
      }

      if (state.level === 4 && !state.ratioSelected) {
        feedback.style.display = 'block';
        feedback.innerHTML = '<div class="error">Please choose a ratio first (sin, cos, or tan).</div>';
        return;
      }

      if (state.level === 2 && !equationInput.value.trim()) {
        feedback.style.display = 'block';
        feedback.innerHTML = '<div class="error">Please write your equation in Guided mode.</div>';
        return;
      }

      const ratioCorrect = state.level !== 4 || state.ratioSelected === 'tan';
      const answerCorrect = isAnswerCorrect(value, q.answer, q.type);
      const correct = ratioCorrect && answerCorrect;

      if (q.attempts === 0) {
        state.questionsAnswered += 1;
        if (correct) {
          state.correctFirstAttempt += 1;
        }
      }
      q.attempts += 1;

      if (correct) {
        state.points += q.attempts === 1 ? 10 : 5;
        state.currentStreak += 1;
        state.levelStreak += 1;
        let levelMessage = '';
        if (state.levelStreak >= 2 && state.level < 4) {
          state.level += 1;
          state.levelStreak = 0;
          levelMessage = `<span class="success">You advanced to Level ${state.level}!</span>`;
        }
        showFeedback(true, levelMessage);
      } else {
        state.points = Math.max(0, state.points - 2);
        state.currentStreak = 0;
        state.levelStreak = 0;
        showFeedback(false);
      }
    }

    ratioButtons.addEventListener('click', (event) => {
      const btn = event.target.closest('.ratio-btn');
      if (!btn) return;
      state.ratioSelected = btn.dataset.ratio;
      ratioButtons.querySelectorAll('.ratio-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    });

    checkBtn.addEventListener('click', handleCheck);

    tryAgainBtn.addEventListener('click', () => {
      feedback.style.display = 'none';
      tryAgainBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      answerInput.focus();
    });

    nextBtn.addEventListener('click', () => {
      createQuestion();
      render();
    });

    createQuestion();
    render();
  </script>
</body>
</html>
