<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveyor's Challenge</title>
  <style>
    :root {
      --blue: #1d4ed8;
      --green: #15803d;
      --red: #dc2626;
      --bg: #f0f9ff;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
    }

    body {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0%, #eff6ff 30%, #f8fafc 100%);
      margin: 0;
      padding: 24px;
      color: var(--ink);
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      border: 1px solid #dbeafe;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.1);
    }

    h1 {
      text-align: center;
      margin: 0 0 14px;
      color: #0f3e67;
      letter-spacing: 0.2px;
    }

    .question-prompt {
      text-align: center;
      margin-bottom: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    canvas {
      display: block;
      width: 600px;
      height: 350px;
      max-width: 100%;
      margin: 0 auto 12px;
      border: 3px solid #60a5fa;
      border-radius: 14px;
      background: linear-gradient(180deg, #e0f2fe 0%, #f0f9ff 60%, #e2e8f0 100%);
    }

    .badge-row,
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
    }

    .badge {
      background: #dbeafe;
      color: #1e3a8a;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .progress-wrap {
      margin: 8px 0 10px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .progress-track {
      height: 12px;
      background: #cbd5e1;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e 0%, #16a34a 100%);
      transition: width 0.2s ease;
    }

    .feedback {
      background: #f8fafc;
      border: 1px solid #dbe3ef;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    input,
    button {
      font-size: 1rem;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #94a3b8;
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: 700;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: #fff;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(37, 99, 235, 0.22);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .secondary {
      background: #64748b;
    }

    .success {
      color: var(--green);
      font-weight: 700;
    }

    .error {
      color: var(--red);
      font-weight: 700;
    }

    .note {
      display: none;
      margin-top: 6px;
      padding: 8px;
      border-left: 4px solid #f59e0b;
      background: #fffbeb;
      border-radius: 8px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #hintBtn,
    [data-role="hint"] {
      display: none !important;
    }

    #questionTypeBadge,
    #sceneTypeBadge,
    #ratioBadge {
      display: none !important;
    }

    .badge-row {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Surveyor's Challenge</h1>
    <div id="questionPrompt" class="question-prompt"></div>
    <canvas id="sceneCanvas" width="600" height="350"></canvas>

    <div class="badge-row">
      <span id="questionTypeBadge" class="badge"></span>
      <span id="sceneTypeBadge" class="badge"></span>
      <span id="ratioBadge" class="badge"></span>
    </div>

    <div class="stats-row">
      <span class="badge" id="questionsBadge"></span>
      <span class="badge" id="firstTryBadge"></span>
      <span class="badge" id="streakBadge"></span>
      <span class="badge" id="pointsBadge"></span>
    </div>

    <div class="controls">
      <input id="answerInput" type="number" step="0.1" placeholder="Type your answer" />
      <button id="checkBtn" type="button">Check Answer</button>
    </div>

    <div id="feedback" class="feedback" style="display:none;"></div>

    <div class="actions">
      <button id="tryAgainBtn" class="secondary" type="button" style="display:none;">Try Again</button>
      <button id="nextBtn" type="button" style="display:none;">Next Question</button>
    </div>

    <div id="depressionNote" class="note">
      Notice: the angle of depression from the observer equals the angle of elevation from the target — alternate angles on parallel lines!
    </div>
  </div>

  <script src="./sprite-map.js"></script>
  <script>
    const canvas = document.getElementById('sceneCanvas');
    const ctx = canvas.getContext('2d');

    const questionTypeBadge = document.getElementById('questionTypeBadge');
    const sceneTypeBadge = document.getElementById('sceneTypeBadge');
    const ratioBadge = document.getElementById('ratioBadge');
    const questionsBadge = document.getElementById('questionsBadge');
    const firstTryBadge = document.getElementById('firstTryBadge');
    const streakBadge = document.getElementById('streakBadge');
    const pointsBadge = document.getElementById('pointsBadge');
    const questionPrompt = document.getElementById('questionPrompt');
    const answerInput = document.getElementById('answerInput');
    const checkBtn = document.getElementById('checkBtn');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const depressionNote = document.getElementById('depressionNote');
    const spriteMap = window.SPRITE_MAP || {
      imageSrc: './ChatGPT Image May 23, 2026, 12_00_55 PM.png',
      sheet: { cellW: 256, cellH: 256 },
      sprites: {
        surveyor: { col: 1, row: 2, width: 58, height: 58, xOffset: 2, yOffset: 2 },
        target: { col: 3, row: 3, width: 64, height: 64, xOffset: 0, yOffset: 8 }
      }
    };
    const spriteSheet = new Image();
    const spriteMeta = {
      loaded: false,
      failed: false,
      cellW: spriteMap.sheet.cellW,
      cellH: spriteMap.sheet.cellH
    };
    const spriteFrames = spriteMap.sprites;

    spriteSheet.onload = () => {
      spriteMeta.loaded = true;
      if (state.currentQuestion) {
        drawScene();
      }
    };
    spriteSheet.onerror = () => {
      spriteMeta.failed = true;
    };
    spriteSheet.src = spriteMap.imageSrc;

    const questionTypes = [
      'HEIGHT_FROM_ADJ_ANGLE',
      'DIST_FROM_OPP_ANGLE',
      'ANGLE_FROM_SIDES',
      'HYP_FROM_OPP_ANGLE',
      'HYP_FROM_ADJ_ANGLE',
      'HEIGHT_FROM_HYP_ANGLE',
      'DIST_FROM_HYP_ANGLE'
    ];

    const triples = [
      [3, 4, 5],
      [5, 12, 13],
      [8, 15, 17],
      [7, 24, 25],
      [9, 40, 41]
    ];

    const state = {
      questionsAnswered: 0,
      correctFirstAttempt: 0,
      currentStreak: 0,
      points: 0,
      nextQuestionIndex: randInt(0, questionTypes.length - 1),
      currentQuestion: null
    };

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function nextQuestionType() {
      const type = questionTypes[state.nextQuestionIndex];
      state.nextQuestionIndex = (state.nextQuestionIndex + 1) % questionTypes.length;
      return type;
    }

    function roundTo1dp(value) {
      return Math.round(value * 10) / 10;
    }

    function createQuestion() {
      const sceneType = Math.random() < 0.5 ? 'ELEVATION' : 'DEPRESSION';
      const type = nextQuestionType();
      const [a, b, c] = triples[randInt(0, triples.length - 1)];
      const scale = randInt(4, 10);
      const swapLegs = Math.random() < 0.5;
      const adjacent = (swapLegs ? b : a) * scale;
      const opposite = (swapLegs ? a : b) * scale;
      const hypotenuse = c * scale;
      const theta = roundTo1dp(Math.atan(opposite / adjacent) * 180 / Math.PI);

      let answer;
      let unknown;
      let ratio;
      let solveText = '';
      let prompt = '';

      if (type === 'HEIGHT_FROM_ADJ_ANGLE') {
        answer = opposite;
        unknown = 'opposite';
        ratio = 'tan';
        solveText = `${adjacent} × tan(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor is ${adjacent} m from a tower and measures an angle of elevation of ${theta}°. Find the tower height.`
          : `From a lookout point, a surveyor measures an angle of depression of ${theta}° to a target. The horizontal distance is ${adjacent} m. Find the vertical drop.`;
      } else if (type === 'DIST_FROM_OPP_ANGLE') {
        answer = adjacent;
        unknown = 'adjacent';
        ratio = 'tan';
        solveText = `${opposite} ÷ tan(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° to the top of a structure. The structure is ${opposite} m high. How far is the surveyor from the base?`
          : `A lookout station is ${opposite} m above sea level. A boat is seen at an angle of depression of ${theta}°. How far is the boat horizontally from the station?`;
      } else if (type === 'ANGLE_FROM_SIDES') {
        answer = theta;
        unknown = 'angle';
        ratio = 'tan';
        solveText = `tan⁻¹(${opposite} ÷ ${adjacent}) = ${answer.toFixed(1)}°`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor is ${adjacent} m from a building and the top is ${opposite} m above eye level. Find the angle of elevation.`
          : `From a cliff lookout, the target is ${adjacent} m away horizontally and ${opposite} m below. Find the angle of depression.`;
      } else if (type === 'HYP_FROM_OPP_ANGLE') {
        answer = hypotenuse;
        unknown = 'hypotenuse';
        ratio = 'sin';
        solveText = `${opposite} ÷ sin(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° and knows the height difference is ${opposite} m. Find the line-of-sight distance.`
          : `A lookout measures an angle of depression of ${theta}° to a point ${opposite} m below. Find the line-of-sight distance.`;
      } else if (type === 'HYP_FROM_ADJ_ANGLE') {
        answer = hypotenuse;
        unknown = 'hypotenuse';
        ratio = 'cos';
        solveText = `${adjacent} ÷ cos(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor stands ${adjacent} m from a tower and measures an angle of elevation of ${theta}°. Find the line-of-sight distance to the top.`
          : `A lookout sees a target at an angle of depression of ${theta}° with a horizontal distance of ${adjacent} m. Find the line-of-sight distance.`;
      } else if (type === 'HEIGHT_FROM_HYP_ANGLE') {
        answer = opposite;
        unknown = 'opposite';
        ratio = 'sin';
        solveText = `${hypotenuse} × sin(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° and a line-of-sight distance of ${hypotenuse} m. Find the height difference.`
          : `A lookout has a line of sight of ${hypotenuse} m to a target at an angle of depression of ${theta}°. Find the vertical drop.`;
      } else {
        answer = adjacent;
        unknown = 'adjacent';
        ratio = 'cos';
        solveText = `${hypotenuse} × cos(${theta}°) = ${answer} m`;
        prompt = sceneType === 'ELEVATION'
          ? `A surveyor measures an angle of elevation of ${theta}° and a line-of-sight distance of ${hypotenuse} m. Find the horizontal distance to the base.`
          : `A lookout has a line-of-sight distance of ${hypotenuse} m to a target at an angle of depression of ${theta}°. Find the horizontal distance.`;
      }

      state.currentQuestion = {
        sceneType,
        adjacent,
        opposite,
        hypotenuse,
        theta,
        type,
        ratio,
        unknown,
        solveText,
        prompt,
        answer,
        attempts: 0
      };
    }

    function getTypeLabel(type) {
      if (type === 'HEIGHT_FROM_ADJ_ANGLE' || type === 'HEIGHT_FROM_HYP_ANGLE') return 'Find Height';
      if (type === 'DIST_FROM_OPP_ANGLE' || type === 'DIST_FROM_HYP_ANGLE') return 'Find Distance';
      if (type === 'ANGLE_FROM_SIDES') return 'Find Angle';
      return 'Find Line-of-Sight';
    }

    function workedSolution(q) {
      const valueText = q.unknown === 'angle' ? `${q.answer.toFixed(1)}°` : `${q.answer} m`;

      return [
        `Step 1: Use <strong>${q.ratio}</strong> for this relationship.`,
        `Step 2: Compute: ${q.solveText}`,
        `<strong>Answer: ${valueText}</strong>`
      ].join('<br>');
    }

    function getQuestionPrompt(q) {
      return q.prompt;
    }

    function updateBadges() {
      const q = state.currentQuestion;
      questionTypeBadge.textContent = `Question Type: ${getTypeLabel(q.type)}`;
      sceneTypeBadge.textContent = `Scene: ${q.sceneType === 'ELEVATION' ? 'Elevation' : 'Depression'}`;
      ratioBadge.textContent = `Trig Ratio: ${q.ratio}`;
      questionsBadge.textContent = `Questions: ${state.questionsAnswered}`;
      firstTryBadge.textContent = `First Try Correct: ${state.correctFirstAttempt}`;
      streakBadge.textContent = `Streak: ${state.currentStreak}`;
      pointsBadge.textContent = `Points: ${state.points}`;
      questionPrompt.textContent = getQuestionPrompt(q);
    }

    function drawArc(cx, cy, start, end, radius) {
      ctx.beginPath();
      ctx.arc(cx, cy, radius, start, end);
      ctx.stroke();
    }

    function drawTextWithHalo(text, x, y, color) {
      ctx.save();
      ctx.font = 'bold 18px Arial';
      const padX = 6;
      const width = ctx.measureText(text).width + padX * 2;
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(x - padX, y - 16, width, 22);
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
      ctx.restore();
    }

    function drawSurveyorSprite(footX, footY, scale = 1, facing = 'right') {
      ctx.save();
      ctx.translate(footX, footY);
      ctx.scale(facing === 'left' ? -1 : 1, 1);

      // ground shadow
      ctx.fillStyle = 'rgba(15, 23, 42, 0.20)';
      ctx.beginPath();
      ctx.ellipse(0, 2 * scale, 14 * scale, 4 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      // legs and boots
      ctx.fillStyle = '#1f2937';
      ctx.fillRect(-8 * scale, -12 * scale, 5 * scale, 12 * scale);
      ctx.fillRect(3 * scale, -12 * scale, 5 * scale, 12 * scale);
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(-10 * scale, -1 * scale, 8 * scale, 3 * scale);
      ctx.fillRect(2 * scale, -1 * scale, 8 * scale, 3 * scale);

      // torso
      const jacketGrad = ctx.createLinearGradient(0, -24 * scale, 0, -10 * scale);
      jacketGrad.addColorStop(0, '#0f4c81');
      jacketGrad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = jacketGrad;
      ctx.fillRect(-10 * scale, -26 * scale, 20 * scale, 16 * scale);

      // high-vis vest
      ctx.fillStyle = '#facc15';
      ctx.fillRect(-3 * scale, -25 * scale, 6 * scale, 14 * scale);
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(-3 * scale, -20 * scale, 6 * scale, 1.8 * scale);

      // arms
      ctx.fillStyle = '#1d4ed8';
      ctx.fillRect(-16 * scale, -24 * scale, 7 * scale, 4 * scale);
      ctx.fillRect(9 * scale, -23 * scale, 8 * scale, 4 * scale);

      // head and helmet
      ctx.fillStyle = '#f1c27d';
      ctx.beginPath();
      ctx.arc(0, -32 * scale, 6.5 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(0, -35 * scale, 7.2 * scale, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(-7 * scale, -35 * scale, 14 * scale, 2.2 * scale);

      // face detail
      ctx.fillStyle = '#0f172a';
      ctx.beginPath();
      ctx.arc(-2 * scale, -32 * scale, 0.8 * scale, 0, Math.PI * 2);
      ctx.arc(2 * scale, -32 * scale, 0.8 * scale, 0, Math.PI * 2);
      ctx.fill();

      // tripod and scope
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 1.6 * scale;
      ctx.beginPath();
      ctx.moveTo(16 * scale, -18 * scale);
      ctx.lineTo(14 * scale, 0);
      ctx.moveTo(16 * scale, -18 * scale);
      ctx.lineTo(19 * scale, 0);
      ctx.moveTo(16 * scale, -18 * scale);
      ctx.lineTo(12 * scale, 0);
      ctx.stroke();

      const scopeGrad = ctx.createLinearGradient(9 * scale, -24 * scale, 20 * scale, -20 * scale);
      scopeGrad.addColorStop(0, '#334155');
      scopeGrad.addColorStop(1, '#0f172a');
      ctx.fillStyle = scopeGrad;
      ctx.fillRect(8 * scale, -24 * scale, 12 * scale, 4.5 * scale);

      ctx.strokeStyle = '#0b1220';
      ctx.lineWidth = 1.2 * scale;
      ctx.strokeRect(8.4 * scale, -23.6 * scale, 11.2 * scale, 3.7 * scale);
      ctx.restore();
    }

    function drawTargetSprite(x, y, scale = 1) {
      ctx.save();
      ctx.translate(x, y);

      // buoy base and shadow
      ctx.fillStyle = 'rgba(15, 23, 42, 0.18)';
      ctx.beginPath();
      ctx.ellipse(0, 8 * scale, 22 * scale, 6 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      const floatGrad = ctx.createLinearGradient(0, -6 * scale, 0, 10 * scale);
      floatGrad.addColorStop(0, '#fb923c');
      floatGrad.addColorStop(1, '#ea580c');
      ctx.fillStyle = floatGrad;
      ctx.beginPath();
      ctx.ellipse(0, 4 * scale, 20 * scale, 8 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      // mast
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 2 * scale;
      ctx.beginPath();
      ctx.moveTo(0, -20 * scale);
      ctx.lineTo(0, 2 * scale);
      ctx.stroke();

      // flag
      const flagGrad = ctx.createLinearGradient(0, -20 * scale, 16 * scale, -12 * scale);
      flagGrad.addColorStop(0, '#2563eb');
      flagGrad.addColorStop(1, '#1d4ed8');
      ctx.fillStyle = flagGrad;
      ctx.beginPath();
      ctx.moveTo(0, -20 * scale);
      ctx.lineTo(16 * scale, -16 * scale);
      ctx.lineTo(0, -12 * scale);
      ctx.closePath();
      ctx.fill();

      // reflective target marker
      ctx.fillStyle = '#e2e8f0';
      ctx.beginPath();
      ctx.arc(0, -2 * scale, 6 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0ea5e9';
      ctx.beginPath();
      ctx.arc(0, -2 * scale, 3 * scale, 0, Math.PI * 2);
      ctx.fill();

      // trim
      ctx.strokeStyle = '#7c2d12';
      ctx.lineWidth = 1.3 * scale;
      ctx.beginPath();
      ctx.ellipse(0, 4 * scale, 20 * scale, 8 * scale, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawSpriteFromSheet(frame, centerX, baseY, width, height, facing = 'right') {
      if (!spriteMeta.loaded || spriteMeta.failed) {
        return false;
      }

      const sx = frame.col * spriteMeta.cellW;
      const sy = frame.row * spriteMeta.cellH;

      ctx.save();
      if (facing === 'left') {
        ctx.translate(centerX, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(spriteSheet, sx, sy, spriteMeta.cellW, spriteMeta.cellH, -width / 2, baseY - height, width, height);
      } else {
        ctx.drawImage(spriteSheet, sx, sy, spriteMeta.cellW, spriteMeta.cellH, centerX - width / 2, baseY - height, width, height);
      }
      ctx.restore();
      return true;
    }

    function drawSurveyor(footX, footY, scale = 1, facing = 'right') {
      const frame = spriteFrames.surveyor;
      const xOffset = (frame.xOffset || 0) * (facing === 'left' ? -1 : 1);
      const yOffset = frame.yOffset || 0;
      const drawn = drawSpriteFromSheet(
        frame,
        footX + xOffset * scale,
        footY + yOffset * scale,
        frame.width * scale,
        frame.height * scale,
        facing
      );

      if (!drawn) {
        drawSurveyorSprite(footX, footY, scale, facing);
      }
    }

    function drawTarget(x, y, scale = 1) {
      const frame = spriteFrames.target;
      const drawn = drawSpriteFromSheet(
        frame,
        x + (frame.xOffset || 0) * scale,
        y + (frame.yOffset || 0) * scale,
        frame.width * scale,
        frame.height * scale
      );
      if (!drawn) {
        drawTargetSprite(x, y, scale);
      }
    }

    function drawScene() {
      const q = state.currentQuestion;
      const adjLabel = q.unknown === 'adjacent' ? '? m' : `${q.adjacent} m`;
      const oppLabel = q.unknown === 'opposite' ? '? m' : `${q.opposite} m`;
      const hypLabel = q.unknown === 'hypotenuse' ? '? m' : `${q.hypotenuse} m`;
      const angleLabel = q.unknown === 'angle' ? '?°' : `${q.theta}°`;
      const adjColor = q.unknown === 'adjacent' ? '#dc2626' : '#1d4ed8';
      const oppColor = q.unknown === 'opposite' ? '#dc2626' : '#1d4ed8';
      const hypColor = q.unknown === 'hypotenuse' ? '#dc2626' : '#1d4ed8';
      const angleColor = q.unknown === 'angle' ? '#dc2626' : '#1d4ed8';

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 4;
      ctx.strokeStyle = '#0f172a';
      ctx.fillStyle = '#0f172a';
      ctx.font = 'bold 18px Arial';

      const leftX = 80;
      const rightX = 470;
      const groundY = 280;

      const sky = ctx.createLinearGradient(0, 0, 0, groundY);
      sky.addColorStop(0, '#dbeafe');
      sky.addColorStop(1, '#f0f9ff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, groundY);
      ctx.fillStyle = '#d1fae5';
      ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

      ctx.beginPath();
      ctx.moveTo(20, groundY);
      ctx.lineTo(580, groundY);
      ctx.strokeStyle = '#14532d';
      ctx.stroke();

      if (q.sceneType === 'ELEVATION') {
        const observer = { x: leftX, y: groundY };
        const top = { x: rightX, y: 110 };

        drawSurveyor(observer.x - 2, observer.y + 2, 1, 'right');

        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(rightX, observer.y);
        ctx.strokeStyle = '#64748b';
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(rightX, groundY);
        ctx.lineTo(rightX, top.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(top.x, top.y);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(rightX - 20, groundY);
        ctx.lineTo(rightX - 20, groundY - 20);
        ctx.lineTo(rightX, groundY - 20);
        ctx.stroke();

        drawArc(observer.x, observer.y, -0.45, 0, 28);
        ctx.fillStyle = adjColor;
        ctx.fillText(adjLabel, (observer.x + rightX) / 2 - 30, observer.y + 24);
        ctx.fillStyle = oppColor;
        ctx.fillText(oppLabel, rightX + 12, (groundY + top.y) / 2);
        drawTextWithHalo(angleLabel, observer.x + 42, observer.y - 34, angleColor);
        drawTextWithHalo(hypLabel, (observer.x + top.x) / 2 - 24, (observer.y + top.y) / 2 - 8, hypColor);
      } else {
        const observer = { x: leftX, y: 95 };
        const target = { x: rightX, y: groundY };
        const buildingTopY = observer.y + 18;

        ctx.beginPath();
        ctx.moveTo(40, groundY);
        ctx.lineTo(130, groundY);
        ctx.lineTo(130, buildingTopY);
        ctx.lineTo(40, buildingTopY);
        ctx.closePath();
        ctx.fillStyle = '#cbd5e1';
        ctx.fill();

        drawSurveyor(observer.x, buildingTopY, 0.95, 'right');

        ctx.strokeStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();

        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(observer.x, observer.y);
        ctx.lineTo(target.x, observer.y);
        ctx.strokeStyle = '#64748b';
        ctx.stroke();
        ctx.setLineDash([]);

        drawTarget(target.x, target.y, 1);

        drawArc(observer.x, observer.y, 0, 0.45, 28);

        drawArc(target.x, target.y, -Math.PI + 0.12, -Math.PI + 0.55, 22);

        ctx.fillStyle = adjColor;
        ctx.fillText(adjLabel, (observer.x + target.x) / 2 - 30, groundY + 24);
        ctx.fillStyle = oppColor;
        ctx.fillText(oppLabel, observer.x - 62, (observer.y + groundY) / 2);
        drawTextWithHalo(angleLabel, observer.x + 44, observer.y + 40, angleColor);
        drawTextWithHalo(hypLabel, (observer.x + target.x) / 2 - 20, (observer.y + target.y) / 2 + 8, hypColor);
      }
    }

    function resetRoundUI() {
      feedback.style.display = 'none';
      feedback.innerHTML = '';
      nextBtn.style.display = 'none';
      tryAgainBtn.style.display = 'none';
      depressionNote.style.display = 'none';
      answerInput.value = '';
    }

    function render() {
      updateBadges();
      drawScene();
      resetRoundUI();
    }

    function showFeedback(correct, extraMessage = '') {
      const q = state.currentQuestion;
      const answerText = q.unknown === 'angle' ? `${q.answer.toFixed(1)}°` : `${q.answer} m`;
      feedback.style.display = 'block';

      if (correct) {
        feedback.innerHTML = `<div class="success">✔ Well done!</div>
          <div>Your answer is correct.</div>
          <div><strong>Answer:</strong> ${answerText}${extraMessage ? `<br>${extraMessage}` : ''}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'none';
      } else {
        feedback.innerHTML = `<div class="error">✖ Not quite.</div>
          <div>Full worked solution:</div>
          <div>${workedSolution(q)}</div>`;
        nextBtn.style.display = 'inline-block';
        tryAgainBtn.style.display = 'inline-block';
      }

      if (q.sceneType === 'DEPRESSION') {
        depressionNote.style.display = 'block';
      }

      updateBadges();
    }

    function isAnswerCorrect(userAnswer, expected, type) {
      if (type === 'ANGLE_FROM_SIDES') {
        return Math.abs(userAnswer - expected) <= 0.2;
      }
      return Math.abs(userAnswer - expected) <= 0.5;
    }

    function handleCheck() {
      const q = state.currentQuestion;
      const value = parseFloat(answerInput.value);

      if (Number.isNaN(value)) {
        showFeedback(false, 'Please enter a number.');
        return;
      }

      const correct = isAnswerCorrect(value, q.answer, q.type);

      if (q.attempts === 0) {
        state.questionsAnswered += 1;
        if (correct) {
          state.correctFirstAttempt += 1;
        }
      }
      q.attempts += 1;

      if (correct) {
        state.points += q.attempts === 1 ? 10 : 5;
        state.currentStreak += 1;
        showFeedback(true);
      } else {
        state.points = Math.max(0, state.points - 2);
        state.currentStreak = 0;
        showFeedback(false);
      }
    }

    checkBtn.addEventListener('click', handleCheck);

    tryAgainBtn.addEventListener('click', () => {
      feedback.style.display = 'none';
      tryAgainBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      answerInput.focus();
    });

    nextBtn.addEventListener('click', () => {
      createQuestion();
      render();
    });

    createQuestion();
    render();
  </script>
</body>
</html>
